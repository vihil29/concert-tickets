<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#080810"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="SoundPass"/>
  <title>SoundPass Staff</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="/static/manifest.json"/>
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png"/>

  <!-- jsQR para escanear -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>

  <!-- Fuentes -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>

  <style>
    :root {
      --gold:   #f0a500;
      --gold2:  #ffcc55;
      --dark:   #080810;
      --dark2:  #0f0f1a;
      --card:   #13131f;
      --card2:  #1a1a2e;
      --border: rgba(240,165,0,0.18);
      --text:   #e8e8f0;
      --muted:  #55556a;
      --green:  #22d97a;
      --red:    #ff5566;
      --amber:  #ffb830;
      --safe:   env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }

    html, body {
      height:100%; overflow:hidden;
      background:var(--dark); color:var(--text);
      font-family:'DM Sans', sans-serif;
    }

    /* ══════════════════════════════
       APP SHELL
    ══════════════════════════════ */
    .app {
      display:flex; flex-direction:column;
      height:100vh; height:100dvh;
      position:relative;
    }

    /* Header */
    .app-header {
      padding: 52px 20px 16px;
      background: linear-gradient(180deg, var(--dark2) 0%, transparent 100%);
      display:flex; align-items:center; justify-content:space-between;
      flex-shrink:0;
    }
    .app-header .logo {
      font-family:'Bebas Neue', sans-serif;
      font-size:1.6rem; letter-spacing:2px; color:var(--gold);
    }
    .app-header .screen-title {
      font-size:.78rem; text-transform:uppercase; letter-spacing:2px; color:var(--muted);
    }
    .header-icon {
      width:38px; height:38px; border-radius:12px;
      background:rgba(240,165,0,0.1); border:1px solid var(--border);
      display:flex; align-items:center; justify-content:center;
      font-size:1rem; color:var(--gold);
    }

    /* Contenido de pantallas */
    .screens {
      flex:1; overflow:hidden; position:relative;
    }
    .screen {
      position:absolute; inset:0; overflow-y:auto;
      padding:0 16px 20px; opacity:0; pointer-events:none;
      transform:translateY(16px);
      transition:opacity .25s, transform .25s;
    }
    .screen.active {
      opacity:1; pointer-events:all; transform:translateY(0);
    }

    /* Barra de navegación inferior */
    .nav-bar {
      display:flex; background:var(--card);
      border-top:1px solid rgba(255,255,255,0.06);
      padding-bottom: var(--safe);
      flex-shrink:0;
    }
    .nav-item {
      flex:1; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      padding:10px 0; cursor:pointer; border:none;
      background:transparent; color:var(--muted);
      font-size:.62rem; letter-spacing:.8px; text-transform:uppercase;
      gap:4px; transition:color .2s;
      font-family:'DM Sans', sans-serif;
    }
    .nav-item i { font-size:1.3rem; transition:transform .2s; }
    .nav-item.active { color:var(--gold); }
    .nav-item.active i { transform:scale(1.1); }

    /* ══════════════════════════════
       PANTALLA 1 — ESCÁNER QR
    ══════════════════════════════ */
    #screen-scan { padding:0; }

    .scan-header {
      padding:16px 20px 12px;
      display:flex; align-items:center; justify-content:space-between;
    }
    .scan-header h2 {
      font-family:'Bebas Neue',sans-serif; font-size:1.5rem;
      letter-spacing:1.5px; color:var(--text);
    }

    .camera-wrap {
      position:relative; margin:0 16px;
      border-radius:24px; overflow:hidden;
      background:#000; aspect-ratio:1/1;
      border:1.5px solid var(--border);
    }
    #scan-video { display:none; }
    #scan-canvas { width:100%; height:100%; display:block; object-fit:cover; }

    /* Mira de escaneo */
    .scan-aim {
      position:absolute; inset:0;
      display:flex; align-items:center; justify-content:center;
      pointer-events:none;
    }
    .aim-box {
      width:58%; aspect-ratio:1/1; position:relative;
    }
    .aim-box::before {
      content:'';
      position:absolute; inset:0;
      box-shadow:0 0 0 1000px rgba(0,0,0,0.5);
      border-radius:4px;
    }
    /* Esquinas doradas */
    .aim-corner {
      position:absolute; width:22px; height:22px;
      border-color:var(--gold); border-style:solid;
    }
    .aim-corner.tl { top:0; left:0; border-width:3px 0 0 3px; border-radius:4px 0 0 0; }
    .aim-corner.tr { top:0; right:0; border-width:3px 3px 0 0; border-radius:0 4px 0 0; }
    .aim-corner.bl { bottom:0; left:0; border-width:0 0 3px 3px; border-radius:0 0 0 4px; }
    .aim-corner.br { bottom:0; right:0; border-width:0 3px 3px 0; border-radius:0 0 4px 0; }

    /* Línea de escaneo animada */
    .scan-line {
      position:absolute; left:5%; right:5%; height:2px;
      background:linear-gradient(90deg, transparent, var(--gold), transparent);
      animation:scanMove 2s ease-in-out infinite;
      border-radius:2px;
    }
    @keyframes scanMove {
      0%,100% { top:10%; opacity:.6; }
      50%      { top:85%; opacity:1; }
    }

    /* Placeholder cuando cámara está apagada */
    .camera-placeholder {
      position:absolute; inset:0;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:12px; background:var(--card2);
    }
    .camera-placeholder i { font-size:3rem; color:var(--muted); }
    .camera-placeholder p { color:var(--muted); font-size:.85rem; }

    /* Botón escanear */
    .btn-scan-main {
      margin:16px 16px 0; width:calc(100% - 32px);
      padding:16px; border:none; border-radius:16px; cursor:pointer;
      background:linear-gradient(135deg, var(--gold), #c8870a);
      color:#000; font-weight:700; font-size:1rem;
      font-family:'DM Sans',sans-serif; letter-spacing:.5px;
      display:flex; align-items:center; justify-content:center; gap:10px;
      transition:transform .15s, box-shadow .15s;
      box-shadow:0 8px 24px rgba(240,165,0,0.25);
    }
    .btn-scan-main:active { transform:scale(0.97); }
    .btn-scan-main i { font-size:1.2rem; }
    .btn-scan-main.scanning {
      background:linear-gradient(135deg,#3a3a4a,#2a2a38);
      color:var(--text); box-shadow:none;
    }

    /* Resultado del escaneo */
    .scan-result {
      margin:12px 16px 0; border-radius:20px; padding:20px;
      display:none; animation:popIn .3s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes popIn {
      from { opacity:0; transform:scale(0.9); }
      to   { opacity:1; transform:scale(1); }
    }
    .scan-result.show { display:block; }
    .scan-result.valido  { background:rgba(34,217,122,0.08); border:1.5px solid rgba(34,217,122,0.3); }
    .scan-result.usado   { background:rgba(255,184,48,0.08); border:1.5px solid rgba(255,184,48,0.3); }
    .scan-result.invalido{ background:rgba(255,85,102,0.08); border:1.5px solid rgba(255,85,102,0.3); }

    .result-top { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
    .result-emoji { font-size:2.2rem; }
    .result-label {
      font-family:'Bebas Neue',sans-serif; font-size:1.4rem; letter-spacing:1px;
    }
    .valido   .result-label { color:var(--green); }
    .usado    .result-label { color:var(--amber); }
    .invalido .result-label { color:var(--red); }
    .result-msg { color:var(--muted); font-size:.8rem; }

    .result-info { display:flex; flex-direction:column; gap:8px; }
    .ri-row {
      display:flex; justify-content:space-between; align-items:center;
      padding:7px 0; border-bottom:1px solid rgba(255,255,255,0.05);
      font-size:.85rem;
    }
    .ri-row:last-child { border-bottom:none; }
    .ri-label { color:var(--muted); font-size:.72rem; text-transform:uppercase; letter-spacing:.8px; }
    .ri-value { color:var(--text); font-weight:500; }
    .zona-chip {
      padding:2px 10px; border-radius:6px; font-size:.75rem; font-weight:600;
      background:rgba(240,165,0,0.12); color:var(--gold); border:1px solid var(--border);
    }

    /* ══════════════════════════════
       PANTALLA 2 — TICKETS
    ══════════════════════════════ */
    .section-title {
      font-family:'Bebas Neue',sans-serif; font-size:1.4rem;
      letter-spacing:1.5px; margin:20px 0 12px; color:var(--text);
    }

    .ticket-item {
      background:var(--card); border:1px solid rgba(255,255,255,0.05);
      border-radius:16px; padding:14px 16px; margin-bottom:10px;
      display:flex; align-items:center; gap:14px;
      animation:fadeUp .3s ease both;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(8px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .ticket-avatar {
      width:42px; height:42px; border-radius:12px; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      font-family:'Bebas Neue',sans-serif; font-size:1.1rem; font-weight:700;
    }
    .avatar-activo   { background:rgba(34,217,122,0.12); color:var(--green); border:1px solid rgba(34,217,122,0.25); }
    .avatar-ingresado{ background:rgba(255,184,48,0.12); color:var(--amber); border:1px solid rgba(255,184,48,0.25); }
    .ticket-info { flex:1; min-width:0; }
    .ticket-name { font-weight:600; font-size:.9rem; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .ticket-meta { color:var(--muted); font-size:.72rem; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .ticket-status {
      padding:3px 10px; border-radius:8px; font-size:.68rem;
      font-weight:700; letter-spacing:.5px; text-transform:uppercase; flex-shrink:0;
    }
    .status-activo    { background:rgba(34,217,122,0.1); color:var(--green); }
    .status-ingresado { background:rgba(255,184,48,0.1); color:var(--amber); }

    .load-more {
      width:100%; padding:12px; margin-top:4px;
      background:transparent; border:1px solid rgba(255,255,255,0.08);
      color:var(--muted); border-radius:12px; cursor:pointer;
      font-family:'DM Sans',sans-serif; font-size:.85rem;
      transition:border-color .2s, color .2s;
    }
    .load-more:hover { border-color:var(--border); color:var(--gold); }

    /* ══════════════════════════════
       PANTALLA 3 — ESTADÍSTICAS
    ══════════════════════════════ */
    .stats-grid {
      display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px;
    }
    .stat-card {
      background:var(--card); border:1px solid rgba(255,255,255,0.05);
      border-radius:18px; padding:18px 16px;
      animation:fadeUp .3s ease both;
    }
    .stat-card.full { grid-column:1/-1; }
    .stat-icon {
      width:36px; height:36px; border-radius:10px;
      display:flex; align-items:center; justify-content:center;
      font-size:1rem; margin-bottom:12px;
    }
    .stat-num {
      font-family:'Bebas Neue',sans-serif; font-size:2.2rem;
      line-height:1; margin-bottom:4px;
    }
    .stat-label { color:var(--muted); font-size:.72rem; text-transform:uppercase; letter-spacing:.8px; }

    /* Barra de progreso de zona */
    .zona-bar-item { margin-bottom:14px; }
    .zona-bar-header {
      display:flex; justify-content:space-between; margin-bottom:6px;
      font-size:.82rem;
    }
    .zona-bar-name { color:var(--text); font-weight:500; }
    .zona-bar-count { color:var(--muted); }
    .zona-bar-track {
      height:6px; background:rgba(255,255,255,0.06); border-radius:4px; overflow:hidden;
    }
    .zona-bar-fill {
      height:100%; border-radius:4px;
      background:linear-gradient(90deg, var(--gold), var(--gold2));
      transition:width 1s cubic-bezier(.4,0,.2,1);
    }

    /* Donut chart simple */
    .donut-wrap {
      display:flex; align-items:center; gap:20px; padding:4px 0;
    }
    .donut {
      width:90px; height:90px; flex-shrink:0;
      border-radius:50%; position:relative;
    }
    .donut-legend { flex:1; }
    .donut-leg-item {
      display:flex; align-items:center; gap:8px;
      font-size:.8rem; margin-bottom:8px;
    }
    .donut-dot { width:10px; height:10px; border-radius:3px; flex-shrink:0; }

    /* ══════════════════════════════
       PANTALLA 4 — BUSCAR
    ══════════════════════════════ */
    .search-bar {
      display:flex; align-items:center; gap:10px;
      background:var(--card); border:1.5px solid rgba(255,255,255,0.07);
      border-radius:14px; padding:12px 16px; margin:16px 0;
      transition:border-color .2s;
    }
    .search-bar:focus-within { border-color:var(--gold); }
    .search-bar i { color:var(--muted); font-size:1.1rem; flex-shrink:0; }
    .search-bar input {
      flex:1; background:transparent; border:none; outline:none;
      color:var(--text); font-size:.95rem; font-family:'DM Sans',sans-serif;
    }
    .search-bar input::placeholder { color:var(--muted); }

    .empty-state {
      text-align:center; padding:48px 20px; color:var(--muted);
    }
    .empty-state i { font-size:3rem; margin-bottom:12px; display:block; opacity:.4; }
    .empty-state p { font-size:.88rem; }

    /* ══════════════════════════════
       LOADING
    ══════════════════════════════ */
    .skeleton {
      background:linear-gradient(90deg, var(--card) 25%, var(--card2) 50%, var(--card) 75%);
      background-size:200% 100%;
      animation:shimmer 1.4s infinite;
      border-radius:10px; height:64px; margin-bottom:10px;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* Toast notification */
    .toast {
      position:fixed; bottom:80px; left:50%; transform:translateX(-50%) translateY(20px);
      background:var(--card2); border:1px solid var(--border);
      border-radius:12px; padding:10px 20px; font-size:.85rem;
      opacity:0; transition:opacity .3s, transform .3s; z-index:100;
      white-space:nowrap; backdrop-filter:blur(12px);
    }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <div class="app-header">
    <div>
      <div class="logo">🎸 SoundPass</div>
      <div class="screen-title" id="screen-title">Escáner</div>
    </div>
    <div class="header-icon"><i class="bi bi-shield-check"></i></div>
  </div>

  <!-- PANTALLAS -->
  <div class="screens">

    <!-- ── PANTALLA 1: ESCÁNER ── -->
    <div class="screen active" id="screen-scan">
      <div class="scan-header">
        <h2>Validar Ticket</h2>
      </div>

      <div class="camera-wrap">
        <video id="scan-video" autoplay muted playsinline></video>
        <canvas id="scan-canvas"></canvas>
        <div class="scan-aim">
          <div class="aim-box">
            <div class="aim-corner tl"></div>
            <div class="aim-corner tr"></div>
            <div class="aim-corner bl"></div>
            <div class="aim-corner br"></div>
            <div class="scan-line"></div>
          </div>
        </div>
        <div class="camera-placeholder" id="cam-placeholder">
          <i class="bi bi-camera"></i>
          <p>Toca para activar la cámara</p>
        </div>
      </div>

      <button class="btn-scan-main" id="btn-scan" onclick="toggleScaner()">
        <i class="bi bi-qr-code-scan"></i>
        <span id="btn-scan-text">Iniciar Escáner</span>
      </button>

      <div class="scan-result" id="scan-result"></div>
    </div>

    <!-- ── PANTALLA 2: TICKETS ── -->
    <div class="screen" id="screen-tickets">
      <div class="section-title">Tickets Recientes</div>
      <div id="tickets-list"><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div></div>
      <button class="load-more" id="btn-load-more" onclick="cargarMasTickets()">
        <i class="bi bi-arrow-down-circle me-2"></i>Cargar más
      </button>
    </div>

    <!-- ── PANTALLA 3: ESTADÍSTICAS ── -->
    <div class="screen" id="screen-stats">
      <div class="section-title">Dashboard</div>
      <div id="stats-content"><div class="skeleton" style="height:120px"></div></div>
    </div>

    <!-- ── PANTALLA 4: BUSCAR ── -->
    <div class="screen" id="screen-search">
      <div class="search-bar">
        <i class="bi bi-search"></i>
        <input type="text" id="search-input" placeholder="Nombre o correo del asistente..."
               oninput="buscarTickets(this.value)" autocomplete="off"/>
      </div>
      <div id="search-results">
        <div class="empty-state">
          <i class="bi bi-person-search"></i>
          <p>Escribe un nombre o correo para buscar</p>
        </div>
      </div>
    </div>

  </div>

  <!-- NAV BAR -->
  <nav class="nav-bar">
    <button class="nav-item active" onclick="navTo('scan')" id="nav-scan">
      <i class="bi bi-qr-code-scan"></i>
      <span>Escáner</span>
    </button>
    <button class="nav-item" onclick="navTo('tickets')" id="nav-tickets">
      <i class="bi bi-ticket-perforated"></i>
      <span>Tickets</span>
    </button>
    <button class="nav-item" onclick="navTo('stats')" id="nav-stats">
      <i class="bi bi-bar-chart-line"></i>
      <span>Stats</span>
    </button>
    <button class="nav-item" onclick="navTo('search')" id="nav-search">
      <i class="bi bi-search"></i>
      <span>Buscar</span>
    </button>
  </nav>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════
//  NAVEGACIÓN
// ═══════════════════════════════════════════════════
const SCREEN_TITLES = { scan:'Escáner', tickets:'Tickets', stats:'Estadísticas', search:'Buscar' };
let currentScreen = 'scan';

function navTo(screen) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById(`screen-${screen}`).classList.add('active');
  document.getElementById(`nav-${screen}`).classList.add('active');
  document.getElementById('screen-title').textContent = SCREEN_TITLES[screen];

  // Cargar datos al entrar a la pantalla
  if (screen === 'tickets' && ticketsPage === 1) cargarTickets();
  if (screen === 'stats') cargarStats();

  // Apagar cámara al salir del escáner
  if (currentScreen === 'scan' && screen !== 'scan') detenerCamara();
  currentScreen = screen;
}

// ═══════════════════════════════════════════════════
//  ESCÁNER QR
// ═══════════════════════════════════════════════════
let stream      = null;
let escaneando  = false;
let scanLoop    = null;
let yaDetecto   = false;

const video     = document.getElementById('scan-video');
const canvas    = document.getElementById('scan-canvas');
const ctx       = canvas.getContext('2d');
const placeholder = document.getElementById('cam-placeholder');
const btnScan   = document.getElementById('btn-scan');
const btnText   = document.getElementById('btn-scan-text');

async function toggleScaner() {
  if (escaneando) { detenerCamara(); return; }
  yaDetecto = false;
  document.getElementById('scan-result').className = 'scan-result';
  document.getElementById('scan-result').innerHTML = '';

  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal:'environment' } }, audio:false
    });
    video.srcObject = stream;
    placeholder.style.display = 'none';

    video.addEventListener('loadedmetadata', () => {
      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;
      escaneando = true;
      btnScan.classList.add('scanning');
      btnText.textContent = 'Detener Escáner';
      leerFrame();
    }, { once:true });

    await video.play();

  } catch(err) {
    mostrarToast('No se pudo acceder a la cámara');
  }
}

function leerFrame() {
  if (!escaneando || yaDetecto) return;

  if (video.readyState === video.HAVE_ENOUGH_DATA) {
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const qr = jsQR(imageData.data, imageData.width, imageData.height, {
      inversionAttempts:'dontInvert'
    });

    if (qr && qr.data) {
      yaDetecto = true;
      if (navigator.vibrate) navigator.vibrate([80,40,80]);

      // Dibujar borde verde
      ctx.strokeStyle = '#22d97a';
      ctx.lineWidth   = 4;
      ctx.beginPath();
      ctx.moveTo(qr.location.topLeftCorner.x,     qr.location.topLeftCorner.y);
      ctx.lineTo(qr.location.topRightCorner.x,    qr.location.topRightCorner.y);
      ctx.lineTo(qr.location.bottomRightCorner.x, qr.location.bottomRightCorner.y);
      ctx.lineTo(qr.location.bottomLeftCorner.x,  qr.location.bottomLeftCorner.y);
      ctx.closePath();
      ctx.stroke();

      validarQR(qr.data);
      return;
    }
  }
  scanLoop = requestAnimationFrame(leerFrame);
}

async function validarQR(codigo) {
  detenerCamara();

  try {
    const res = await fetch('/api/validar', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ codigo })
    });
    const data = await res.json();
    mostrarResultado(data);

  } catch(err) {
    mostrarToast('Error de conexión');
  }
}

function mostrarResultado(data) {
  const el = document.getElementById('scan-result');
  const iconos = { valido:'✅', usado:'⚠️', invalido:'❌' };
  const labels = { valido:'Acceso Permitido', usado:'Ya Ingresado', invalido:'Ticket Inválido' };

  let infoHtml = '';
  if (data.ticket) {
    infoHtml = `
      <div class="result-info">
        <div class="ri-row">
          <span class="ri-label">Nombre</span>
          <span class="ri-value">${data.ticket.nombre}</span>
        </div>
        <div class="ri-row">
          <span class="ri-label">Zona</span>
          <span class="ri-value"><span class="zona-chip">${data.ticket.zona}</span></span>
        </div>
        <div class="ri-row">
          <span class="ri-label">Comprado</span>
          <span class="ri-value">${data.ticket.fecha_compra || '—'}</span>
        </div>
      </div>`;
  }

  el.innerHTML = `
    <div class="result-top">
      <div class="result-emoji">${iconos[data.estado] || '❓'}</div>
      <div>
        <div class="result-label">${labels[data.estado] || 'Desconocido'}</div>
        <div class="result-msg">${data.mensaje || ''}</div>
      </div>
    </div>
    ${infoHtml}`;

  el.className = `scan-result show ${data.estado}`;
  el.scrollIntoView({ behavior:'smooth', block:'nearest' });
}

function detenerCamara() {
  escaneando = false;
  if (scanLoop) cancelAnimationFrame(scanLoop);
  if (stream)  stream.getTracks().forEach(t => t.stop());
  stream = null; video.srcObject = null;
  placeholder.style.display = 'flex';
  btnScan.classList.remove('scanning');
  btnText.textContent = 'Iniciar Escáner';
}

// ═══════════════════════════════════════════════════
//  PANTALLA TICKETS
// ═══════════════════════════════════════════════════
let ticketsPage = 1;
let ticketsTotal = 0;

async function cargarTickets(reset = true) {
  if (reset) { ticketsPage = 1; document.getElementById('tickets-list').innerHTML = '<div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>'; }

  try {
    const res  = await fetch(`/api/tickets?page=${ticketsPage}&limit=15`);
    const data = await res.json();
    ticketsTotal = data.total;

    const lista = data.tickets.map((t, i) => {
      const inicial = t.nombre ? t.nombre[0].toUpperCase() : '?';
      const estadoCls = t.estado === 'Activo' ? 'activo' : 'ingresado';
      return `
        <div class="ticket-item" style="animation-delay:${i*40}ms">
          <div class="ticket-avatar avatar-${estadoCls}">${inicial}</div>
          <div class="ticket-info">
            <div class="ticket-name">${t.nombre}</div>
            <div class="ticket-meta">${t.correo} · ${t.zona}</div>
          </div>
          <div class="ticket-status status-${estadoCls}">${t.estado}</div>
        </div>`;
    }).join('');

    if (reset) document.getElementById('tickets-list').innerHTML = lista || '<div class="empty-state"><i class="bi bi-inbox"></i><p>No hay tickets aún</p></div>';
    else document.getElementById('tickets-list').innerHTML += lista;

    // Mostrar/ocultar botón cargar más
    const shown = ticketsPage * 15;
    document.getElementById('btn-load-more').style.display = shown >= ticketsTotal ? 'none' : 'block';

  } catch(err) {
    document.getElementById('tickets-list').innerHTML = '<div class="empty-state"><i class="bi bi-wifi-off"></i><p>Error de conexión</p></div>';
  }
}

async function cargarMasTickets() {
  ticketsPage++;
  await cargarTickets(false);
}

// ═══════════════════════════════════════════════════
//  PANTALLA ESTADÍSTICAS
// ═══════════════════════════════════════════════════
async function cargarStats() {
  document.getElementById('stats-content').innerHTML = '<div class="skeleton" style="height:120px;margin-bottom:10px"></div><div class="skeleton" style="height:180px"></div>';

  try {
    const res  = await fetch('/api/stats');
    const data = await res.json();

    const pct = data.total > 0 ? Math.round((data.ingresados / data.total) * 100) : 0;

    // Colores para las zonas
    const colors = ['#f0a500','#4a9eff','#22d97a','#a855f7','#ff5566','#ffb830','#22d3ee','#34d399','#f43f5e','#94a3b8','#6a3aff'];

    const barras = data.por_zona.map((z, i) => {
      const pctZona = data.total > 0 ? Math.round((z.cantidad / data.total) * 100) : 0;
      return `
        <div class="zona-bar-item">
          <div class="zona-bar-header">
            <span class="zona-bar-name">${z.zona}</span>
            <span class="zona-bar-count">${z.cantidad} tickets</span>
          </div>
          <div class="zona-bar-track">
            <div class="zona-bar-fill" style="width:${pctZona}%;background:${colors[i % colors.length]}"></div>
          </div>
        </div>`;
    }).join('');

    document.getElementById('stats-content').innerHTML = `
      <div class="stats-grid">
        <div class="stat-card" style="animation-delay:0ms">
          <div class="stat-icon" style="background:rgba(240,165,0,0.12);color:var(--gold)">
            <i class="bi bi-ticket-perforated"></i>
          </div>
          <div class="stat-num" style="color:var(--gold)">${data.total}</div>
          <div class="stat-label">Total Vendidos</div>
        </div>
        <div class="stat-card" style="animation-delay:60ms">
          <div class="stat-icon" style="background:rgba(34,217,122,0.12);color:var(--green)">
            <i class="bi bi-check-circle"></i>
          </div>
          <div class="stat-num" style="color:var(--green)">${data.ingresados}</div>
          <div class="stat-label">Ingresados</div>
        </div>
        <div class="stat-card" style="animation-delay:120ms">
          <div class="stat-icon" style="background:rgba(74,158,255,0.12);color:#4a9eff">
            <i class="bi bi-hourglass-split"></i>
          </div>
          <div class="stat-num" style="color:#4a9eff">${data.activos}</div>
          <div class="stat-label">Pendientes</div>
        </div>
        <div class="stat-card" style="animation-delay:180ms">
          <div class="stat-icon" style="background:rgba(168,85,247,0.12);color:#a855f7">
            <i class="bi bi-percent"></i>
          </div>
          <div class="stat-num" style="color:#a855f7">${pct}%</div>
          <div class="stat-label">Asistencia</div>
        </div>
        <div class="stat-card full" style="animation-delay:240ms">
          <div class="stat-label" style="margin-bottom:16px">Tickets por Zona</div>
          ${barras || '<p style="color:var(--muted);font-size:.85rem">Sin datos aún</p>'}
        </div>
      </div>`;

    // Animar barras después de renderizar
    setTimeout(() => {
      document.querySelectorAll('.zona-bar-fill').forEach(b => {
        const w = b.style.width;
        b.style.width = '0';
        requestAnimationFrame(() => { b.style.width = w; });
      });
    }, 50);

  } catch(err) {
    document.getElementById('stats-content').innerHTML = '<div class="empty-state"><i class="bi bi-wifi-off"></i><p>Error de conexión</p></div>';
  }
}

// ═══════════════════════════════════════════════════
//  PANTALLA BUSCAR
// ═══════════════════════════════════════════════════
let searchTimer = null;

function buscarTickets(q) {
  clearTimeout(searchTimer);
  if (!q.trim()) {
    document.getElementById('search-results').innerHTML = `
      <div class="empty-state"><i class="bi bi-person-search"></i><p>Escribe un nombre o correo para buscar</p></div>`;
    return;
  }
  // Debounce — espera 400ms después de que el usuario deja de escribir
  searchTimer = setTimeout(async () => {
    try {
      const res  = await fetch(`/api/buscar?q=${encodeURIComponent(q)}`);
      const data = await res.json();

      if (!data.tickets.length) {
        document.getElementById('search-results').innerHTML = `
          <div class="empty-state"><i class="bi bi-search"></i><p>Sin resultados para "${q}"</p></div>`;
        return;
      }

      document.getElementById('search-results').innerHTML = data.tickets.map((t, i) => {
        const inicial  = t.nombre ? t.nombre[0].toUpperCase() : '?';
        const estadoCls = t.estado === 'Activo' ? 'activo' : 'ingresado';
        return `
          <div class="ticket-item" style="animation-delay:${i*40}ms">
            <div class="ticket-avatar avatar-${estadoCls}">${inicial}</div>
            <div class="ticket-info">
              <div class="ticket-name">${t.nombre}</div>
              <div class="ticket-meta">${t.correo} · ${t.zona}</div>
            </div>
            <div class="ticket-status status-${estadoCls}">${t.estado}</div>
          </div>`;
      }).join('');

    } catch(err) {
      mostrarToast('Error de conexión');
    }
  }, 400);
}

// ═══════════════════════════════════════════════════
//  UTILIDADES
// ═══════════════════════════════════════════════════
function mostrarToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

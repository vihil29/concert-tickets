name: Deploy to VPS

on:
  push:
    branches:
      - main  # Se activa cada vez que subes algo a main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Ejecutar comandos en el VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: 22
          script: |
            cd /var/www/concert-tickets
            git pull origin main
            source venv/bin/activate
            pip install -r requirements.txt
            sudo systemctl restart soundpass # Esto reinicia tu app automáticamente